name: Build and publish Docker image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-image.yml"
      - "Dockerfile"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "types/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-image.yml"
      - "Dockerfile"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "types/**"

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    env:
      IMAGE_URI: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vesta/nextjs:${{ github.sha }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_REDIRECT_URL || secrets.NEXT_PUBLIC_SUPABASE_REDIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required build variables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0

          for name in GCP_PROJECT_ID GCP_SA_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub organization secret: $name" >&2
              missing=1
            fi
          done

          for name in NEXT_PUBLIC_API_URL NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_REDIRECT_URL NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub variable or secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Log in to Google Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.IMAGE_URI || format('vesta-frontend:ci-{0}', github.sha) }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_REDIRECT_URL=${{ env.NEXT_PUBLIC_SUPABASE_REDIRECT_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}